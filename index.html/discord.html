<!DOCTYPE html>
<html lang="el">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord Portal</title>

<style>

* {
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #111827;
    color: white;
    margin: 0;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: 50px auto;
}

.card {
    background: #1f2937;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    color: #60a5fa;
}

p {
    color: #d1d5db;
    font-size: 18px;
}

.discord-btn {
    display: inline-block;
    background: #5865F2;
    color: white;
    text-decoration: none;
    padding: 15px 30px;
    margin: 15px;
    border-radius: 10px;
    font-size: 18px;
    transition: 0.3s;
}

.discord-btn:hover {
    background: #4752c4;
    transform: scale(1.05);
}

</style>

</head>


<body>

<div class="container">

<div class="card">

<h1>💬 Discord Portal</h1>

<p>
Επιλέξτε τον Discord Server στον οποίο θέλετε να συνδεθείτε.
</p>


<a class="discord-btn" href="https://discord.gg/EqQ7SMtjh2" target="_blank">
🛡️ Discord Server 1
</a>


<br>


<a class="discord-btn" href="https://discord.gg/DjashMKR2s" target="_blank">
👮 Discord Server 2
</a>


</div>

</div>


</body>

</html>
