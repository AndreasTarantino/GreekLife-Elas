<!DOCTYPE html>
<html lang="el">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Discord Portal</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #111827;
    color: white;
    margin: 0;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 700px;
    margin: auto;
}

.card {
    background: #1f2937;
    border-radius: 15px;
    padding: 30px;
    margin-top: 40px;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

h1 {
    color: #60a5fa;
}

p {
    color: #d1d5db;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 15px 30px;
    margin: 15px;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1d4ed8;
}

.discord {
    background: #5865F2;
}

.discord:hover {
    background: #4752c4;
}

</style>

</head>


<body>


<div class="container">


<div class="card">


<h1>💬 Discord Portal</h1>


<p>
Επιλέξτε τον Discord Server στον οποίο θέλετε να συνδεθείτε.
</p>


<a href="https://discord.gg/EqQ7SMtjh2" target="_blank">
<button class="discord">
    🛡️ Discord Server 1
</button>
</a>


<br>


<a href="https://discord.gg/DjashMKR2s" target="_blank">
<button class="discord">
    👮 Discord Server 2
</button>
</a>


</div>


</div>


</body>

</html>
