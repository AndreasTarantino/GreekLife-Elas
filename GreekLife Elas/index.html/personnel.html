<!DOCTYPE html>
<html lang="el">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GreekLife RP | Προσωπικό</title>

<link rel="stylesheet" href="assets/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>

.personnel-section {

    max-width:1100px;

    margin:30px auto;

    background:white;

    padding:30px;

    border-radius:10px;

    border-top:5px solid #003b73;

    box-shadow:0 3px 10px rgba(0,0,0,0.15);

}


.personnel-grid {

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:25px;

    margin-top:30px;

}


.person-card {

    background:#f4f7fb;

    padding:20px;

    text-align:center;

    border-radius:10px;

    border-top:5px solid #003b73;

}


.person-card img {

    width:180px;

    height:180px;

    object-fit:cover;

    border-radius:5px;

    border:4px solid #003b73;

}


.person-card h3 {

    color:#003b73;

}


.admin-box {

    margin:25px 0;

    padding:20px;

    background:#f4f7fb;

    border-left:5px solid #d4af37;

}


.admin-box input {

    width:100%;

    padding:10px;

    margin:8px 0;

    box-sizing:border-box;

}


.delete-btn {

    background:#a00000;

    color:white;

}


</style>


</head>


<body>


<header class="topbar">


<div class="logo">

<i class="fa-solid fa-shield-halved"></i>

<div>

<h2>GreekLife RP</h2>

<span>Ελληνική Αστυνομία</span>

</div>

</div>


<button id="darkMode">

<i class="fa-solid fa-moon"></i>

</button>


</header>




<div class="layout">


<aside class="sidebar">


<a href="index.html">

<i class="fa-solid fa-house"></i>

Αρχική

</a>


<a class="active" href="personnel.html">

<i class="fa-solid fa-user-shield"></i>

Προσωπικό

</a>


<a href="announcements.html">

<i class="fa-solid fa-bullhorn"></i>

Ανακοινώσεις

</a>


<a href="criminal-code.html">

<i class="fa-solid fa-scale-balanced"></i>

Ποινικός Κώδικας

</a>


<a href="training.html">

<i class="fa-solid fa-graduation-cap"></i>

Εκπαίδευση

</a>


<a href="documents.html">

<i class="fa-solid fa-file"></i>

Έγγραφα

</a>


<a href="gallery.html">

<i class="fa-solid fa-images"></i>

Gallery

</a>


</aside>




<main>


<section class="hero">


<h1>

<i class="fa-solid fa-user-shield"></i>

Προσωπικό

</h1>


<h2>

GreekLife Police Department

</h2>


<p>

Επίσημο μητρώο προσωπικού υπηρεσίας.

</p>


</section>




<section class="personnel-section">


<h2>

Μητρώο Προσωπικού

</h2>




<button onclick="adminLogin()">

🔒 Admin Login

</button>


<button id="logout"
onclick="logout()"
style="display:none;">

Logout

</button>





<div id="adminPanel"
class="admin-box"
style="display:none;">


<h3>

Προσθήκη Προσωπικού

</h3>


<input id="name"
placeholder="Όνομα">


<input id="surname"
placeholder="Επίθετο">


<input id="rank"
placeholder="Βαθμός">


<input id="photo"
placeholder="URL Φωτογραφίας">


<button onclick="addPerson()">

Προσθήκη

</button>


</div>





<div id="personnelList"
class="personnel-grid">

</div>



</section>


</main>


</div>




<footer>

GreekLife RP © 2026 | Police Department

</footer>




<script>


const ADMIN="AndreasTarantino";

const PASSWORD="Tarantino90";




function adminLogin(){


let u=prompt("Username");

let p=prompt("Password");


if(u===ADMIN && p===PASSWORD){


localStorage.setItem("personAdmin","true");


showAdmin();


}

else{


alert("Λάθος στοιχεία");


}


}



function showAdmin(){


document.getElementById("adminPanel").style.display="block";


document.getElementById("logout").style.display="inline-block";


}



function logout(){


localStorage.removeItem("personAdmin");


location.reload();


}



function addPerson(){


let people=JSON.parse(

localStorage.getItem("people")
)||[];



people.push({


id:Date.now(),

name:name.value,

surname:surname.value,

rank:rank.value,

photo:photo.value


});


localStorage.setItem(

"people",

JSON.stringify(people)
);


loadPeople();

}



function loadPeople(){


let people=JSON.parse(

localStorage.getItem("people")
)||[];

let area=document.getElementById("personnelList");


area.innerHTML="";


people.forEach(p=>{


let card=document.createElement("div");


card.className="person-card";


card.innerHTML=`

<img src="${p.photo}">


<h3>

${p.name} ${p.surname}

</h3>


<p>

<b>Βαθμός:</b>

${p.rank}

</p>


`;


if(localStorage.getItem("personAdmin")=="true"){


let btn=document.createElement("button");


btn.className="delete-btn";


btn.innerHTML="Διαγραφή";


btn.onclick=function(){


deletePerson(p.id);


};


card.appendChild(btn);


}


area.appendChild(card);


});


}



function deletePerson(id){


let people=JSON.parse(

localStorage.getItem("people")
)||[];



people=people.filter(

p=>p.id!==id

);


localStorage.setItem(

"people",

JSON.stringify(people)
);


loadPeople();

}



if(localStorage.getItem("personAdmin")=="true"){


showAdmin();

}


loadPeople();


</script>


</body>
